<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Tetris Mobile</title>
<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}
body{
  background:#111;
  color:#fff;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  padding:10px;
}
h1{
  margin:8px 0;
  font-size:24px;
}
.wrap{
  width:100%;
  max-width:420px;
}
.info{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
  font-size:18px;
}
canvas{
  width:100%;
  background:#000;
  border:2px solid #555;
  touch-action:none;
}
.controls{
  margin-top:10px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
button{
  padding:14px;
  font-size:22px;
  border:none;
  border-radius:10px;
  background:#333;
  color:#fff;
}
button:active{
  background:#666;
}
.big{
  grid-column:span 3;
  background:#0077ff;
}
@media (min-width:700px){
  .controls{
    max-width:420px;
  }
}
</style>
</head>
<body>
<h1>TETRIS</h1>

<div class="wrap">
  <div class="info">
    <div>Score: <span id="score">0</span></div>
    <div>Lines: <span id="lines">0</span></div>
  </div>

  <canvas id="game" width="300" height="600"></canvas>

  <div class="controls">
    <button id="left">◀</button>
    <button id="rotate">⟳</button>
    <button id="right">▶</button>
    <button id="down">▼</button>
    <button id="drop" class="big">DROP</button>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const COLS = 10;
const ROWS = 20;
const BLOCK = canvas.width / COLS;

const scoreEl = document.getElementById("score");
const linesEl = document.getElementById("lines");

let board = [];
let score = 0;
let lines = 0;
let gameOver = false;

const colors = [
 null,
 "#00ffff",
 "#0000ff",
 "#ff8800",
 "#ffff00",
 "#00ff00",
 "#aa00ff",
 "#ff0000"
];

const pieces = [
 [],
 [[1,1,1,1]],
 [[2,0,0],[2,2,2]],
 [[0,0,3],[3,3,3]],
 [[4,4],[4,4]],
 [[0,5,5],[5,5,0]],
 [[0,6,0],[6,6,6]],
 [[7,7,0],[0,7,7]]
];

function resetBoard(){
  board = Array.from({length:ROWS}, ()=>Array(COLS).fill(0));
}

function newPiece(){
  const id = Math.floor(Math.random()*7)+1;
  return {
    x:3,
    y:0,
    shape:pieces[id],
    id:id
  };
}

let player = newPiece();

function drawCell(x,y,color){
  ctx.fillStyle = color;
  ctx.fillRect(x*BLOCK,y*BLOCK,BLOCK,BLOCK);
  ctx.strokeStyle="#111";
  ctx.strokeRect(x*BLOCK,y*BLOCK,BLOCK,BLOCK);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      if(board[y][x]){
        drawCell(x,y,colors[board[y][x]]);
      }
    }
  }

  player.shape.forEach((row,dy)=>{
    row.forEach((value,dx)=>{
      if(value){
        drawCell(player.x+dx,player.y+dy,colors[player.id]);
      }
    });
  });

  if(gameOver){
    ctx.fillStyle="rgba(0,0,0,.7)";
    ctx.fillRect(0,250,300,100);
    ctx.fillStyle="#fff";
    ctx.font="28px sans-serif";
    ctx.fillText("GAME OVER",55,310);
  }
}

function collide(px,py,shape){
  for(let y=0;y<shape.length;y++){
    for(let x=0;x<shape[y].length;x++){
      if(shape[y][x]){
        let nx = px+x;
        let ny = py+y;

        if(nx<0 || nx>=COLS || ny>=ROWS) return true;
        if(ny>=0 && board[ny][nx]) return true;
      }
    }
  }
  return false;
}

function merge(){
  player.shape.forEach((row,y)=>{
    row.forEach((value,x)=>{
      if(value){
        board[player.y+y][player.x+x]=player.id;
      }
    });
  });
}

function rotate(shape){
  return shape[0].map((_,i)=>
    shape.map(row=>row[i]).reverse()
  );
}

function clearLines(){
  let count=0;

  outer:
  for(let y=ROWS-1;y>=0;y--){
    for(let x=0;x<COLS;x++){
      if(board[y][x]===0) continue outer;
    }

    board.splice(y,1);
    board.unshift(Array(COLS).fill(0));
    count++;
    y++;
  }

  if(count){
    lines += count;
    score += count * 100;
    scoreEl.textContent = score;
    linesEl.textContent = lines;
  }
}

function spawn(){
  player = newPiece();
  if(collide(player.x,player.y,player.shape)){
    gameOver = true;
  }
}

function move(dir){
  if(!collide(player.x+dir,player.y,player.shape)){
    player.x += dir;
  }
}

function softDrop(){
  if(!collide(player.x,player.y+1,player.shape)){
    player.y++;
  }else{
    merge();
    clearLines();
    spawn();
  }
}

function hardDrop(){
  while(!collide(player.x,player.y+1,player.shape)){
    player.y++;
  }
  softDrop();
}

function turn(){
  const rotated = rotate(player.shape);
  if(!collide(player.x,player.y,rotated)){
    player.shape = rotated;
  }
}

let lastTime=0;
let dropCounter=0;
let dropInterval=600;

function update(time=0){
  const delta = time-lastTime;
  lastTime=time;

  if(!gameOver){
    dropCounter += delta;
    if(dropCounter > dropInterval){
      softDrop();
      dropCounter=0;
    }
    draw();
    requestAnimationFrame(update);
  }else{
    draw();
  }
}

document.addEventListener("keydown",e=>{
  if(gameOver && e.key==="Enter"){
    restart();
    return;
  }

  if(e.key==="ArrowLeft") move(-1);
  if(e.key==="ArrowRight") move(1);
  if(e.key==="ArrowDown") softDrop();
  if(e.key==="ArrowUp") turn();
  if(e.key===" ") hardDrop();
});

function bind(id,fn){
  document.getElementById(id).addEventListener("touchstart",(e)=>{
    e.preventDefault();
    fn();
  });
  document.getElementById(id).addEventListener("click",fn);
}

bind("left",()=>move(-1));
bind("right",()=>move(1));
bind("down",softDrop);
bind("rotate",turn);
bind("drop",hardDrop);

function restart(){
  score=0;
  lines=0;
  gameOver=false;
  scoreEl.textContent=0;
  linesEl.textContent=0;
  resetBoard();
  spawn();
  update();
}

resetBoard();
update();
</script>
</body>
</html>
